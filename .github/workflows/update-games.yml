name: Update Switch 2 Game Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 playwright

      - name: Install Playwright browser (for Nintendo Wire format scraping)
        run: playwright install chromium --with-deps

      - name: Run scraper
        working-directory: scripts
        run: python scrape.py

      - name: Check if data changed
        id: diff
        run: |
          git diff --quiet data/games.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated game data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "Switch2-Bot"
          git config user.email "actions@github.com"
          git add data/games.json
          COUNT=$(python3 -c "import json; d=json.load(open('data/games.json')); print(d['count'])")
          CIB=$(python3 -c "import json; d=json.load(open('data/games.json')); print(sum(1 for g in d['games'] if g.get('fmt')=='b'))")
          DATE=$(date -u '+%Y-%m-%d')
          git commit -m "chore: update game list → ${COUNT} games, ${CIB} Code-in-Box (${DATE})"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: No changes detected
        if: steps.diff.outputs.changed == 'false'
        run: echo "Game data is already up to date."
